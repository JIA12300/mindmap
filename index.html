<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindMap - 思维导图协作</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f8; color: #1a1d2e; }
    
    :root {
      --bg: #f0f2f8;
      --surface: #fff;
      --border: #dde1f0;
      --text: #1a1d2e;
      --text2: #6b7499;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
    }
    
    .hidden { display: none !important; }
    
    /* Auth View */
    #auth-view {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-logo { font-size: 48px; margin-bottom: 40px; }
    .auth-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(108,99,255,.08);
    }
    .auth-tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--border);
    }
    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      color: var(--text2);
    }
    .auth-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--text); font-weight: 500; }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { background: #c8cde0; }
    .error-msg { color: #ef5350; font-size: 13px; margin-top: 8px; }
    
    /* List View */
    #list-view { min-height: 100vh; }
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-logo { font-size: 24px; font-weight: 600; }
    .topbar-user { display: flex; align-items: center; gap: 16px; }
    .topbar-username { color: var(--text2); }
    .list-content { padding: 32px; max-width: 1200px; margin: 0 auto; }
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .list-header h2 { font-size: 28px; }
    .btn-new {
      background: var(--accent);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
    }
    .btn-new:hover { background: var(--accent-hover); }
    .map-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .map-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
    }
    .map-card:hover {
      box-shadow: 0 4px 16px rgba(108,99,255,.12);
      transform: translateY(-2px);
    }
    .map-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .map-card-title { font-size: 18px; font-weight: 600; flex: 1; }
    .map-card-tag {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      background: var(--border);
      color: var(--text2);
    }
    .map-card-tag.shared { background: #e3f2fd; color: #1976d2; }
    .map-card-time { font-size: 13px; color: var(--text2); }
    .map-card-actions { margin-top: 12px; display: flex; gap: 8px; }
    .map-card-actions button {
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .map-card-actions button:hover { background: var(--bg); }
    .map-card-actions .btn-delete { color: #ef5350; }
    
    /* Editor View */
    #editor-view { height: 100vh; display: flex; flex-direction: column; }
    .editor-topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .editor-topbar .btn-back { background: none; border: none; font-size: 20px; cursor: pointer; }
    .editor-topbar .title-input {
      flex: 1;
      border: none;
      font-size: 18px;
      font-weight: 600;
      padding: 8px;
      border-radius: 6px;
    }
    .editor-topbar .title-input:focus { outline: none; background: var(--bg); }
    .sync-status {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    .sync-status.synced { background: #e8f5e9; color: #2e7d32; }
    .sync-status.syncing { background: #fff3e0; color: #f57c00; }
    .sync-status.failed { background: #ffebee; color: #c62828; }
    .editor-content { flex: 1; position: relative; overflow: hidden; }
    #svg-canvas { width: 100%; height: 100%; cursor: grab; }
    #svg-canvas.dragging { cursor: grabbing; }
    
    /* Right Sidebar */
    .sidebar {
      position: absolute;
      right: 0;
      top: 0;
      width: 300px;
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar h3 { margin-bottom: 20px; }
    .sidebar .form-group { margin-bottom: 16px; }
    .sidebar textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      resize: vertical;
      min-height: 80px;
    }
    .color-palette { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .color-dot.active { border-color: var(--accent); }
    
    /* Context Menu */
    .context-menu {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      padding: 6px;
      z-index: 1000;
      min-width: 160px;
    }
    .context-menu-item {
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }
    .context-menu-item:hover { background: var(--bg); }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal {
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      min-width: 400px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h3 { margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
    
    /* Collaborator List */
    .collaborator-list { margin-top: 20px; }
    .collaborator-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .collaborator-item .remove-btn {
      background: none;
      border: none;
      color: #ef5350;
      cursor: pointer;
      font-size: 18px;
    }
    .search-result {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-top: 8px;
      cursor: pointer;
    }
    .search-result:hover { background: var(--bg); }
    
    /* Minimap */
    .minimap {
      position: absolute;
      right: 20px;
      bottom: 20px;
      width: 140px;
      height: 90px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    #minimap-svg { width: 100%; height: 100%; }
    
    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      z-index: 3000;
      animation: slideIn 0.3s;
    }
    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* Loading */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4000;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Import Tabs */
    .import-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .import-tab {
      padding: 10px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .import-tab.active { border-bottom-color: var(--accent); color: var(--accent); }
    .import-content { display: none; }
    .import-content.active { display: block; }
    .file-input-wrapper { position: relative; }
    .file-input-wrapper input[type="file"] { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; }
  </style>
</head>
<body>
  <!-- Auth View -->
  <div id="auth-view">
    <div class="auth-logo">🧠 MindMap</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">登录</div>
        <div class="auth-tab" data-tab="register">注册</div>
      </div>
      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" required>
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" class="btn btn-primary">登录</button>
      </form>
      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="register-email" required>
        </div>
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="register-username" pattern="[a-zA-Z0-9_]{3,20}" required title="3-20位字母数字下划线">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="register-password" required minlength="6">
        </div>
        <div class="form-group">
          <label>确认密码</label>
          <input type="password" id="register-password-confirm" required>
        </div>
        <div id="register-error" class="error-msg"></div>
        <button type="submit" class="btn btn-primary">注册</button>
      </form>
    </div>
  </div>

  <!-- List View -->
  <div id="list-view" class="hidden">
    <div class="topbar">
      <div class="topbar-logo">🧠 MindMap</div>
      <div class="topbar-user">
        <span class="topbar-username" id="current-username"></span>
        <button class="btn btn-secondary" id="logout-btn">退出</button>
      </div>
    </div>
    <div class="list-content">
      <div class="list-header">
        <h2>我的导图</h2>
        <button class="btn btn-new" id="new-map-btn">+ 新建导图</button>
      </div>
      <div class="map-grid" id="map-grid"></div>
    </div>
  </div>

  <!-- Editor View -->
  <div id="editor-view" class="hidden">
    <div class="editor-topbar">
      <button class="btn-back" id="back-btn">←</button>
      <input type="text" class="title-input" id="title-input" placeholder="导图标题">
      <button class="btn btn-secondary" id="share-btn">👥 共享</button>
      <button class="btn btn-secondary" id="import-btn">📥 导入</button>
      <button class="btn btn-secondary" id="export-svg-btn">⬇ 导出SVG</button>
      <button class="btn btn-secondary" id="export-json-btn">📦 导出JSON</button>
      <div class="sync-status synced" id="sync-status">已同步</div>
      <button class="btn btn-primary" id="save-btn">💾 保存</button>
    </div>
    <div class="editor-content">
      <svg id="svg-canvas"></svg>
      <div class="sidebar" id="sidebar">
        <h3>节点编辑</h3>
        <div class="form-group">
          <label>标签</label>
          <input type="text" id="node-label">
        </div>
        <div class="form-group">
          <label>备注</label>
          <textarea id="node-note"></textarea>
        </div>
        <div class="form-group">
          <label>背景色</label>
          <div class="color-palette" id="bg-colors"></div>
        </div>
        <div class="form-group">
          <label>字号</label>
          <input type="number" id="node-fontsize" min="10" max="32" value="14">
        </div>
        <div class="form-group">
          <label>字色</label>
          <div class="color-palette" id="text-colors"></div>
        </div>
      </div>
      <div class="minimap">
        <svg id="minimap-svg"></svg>
      </div>
    </div>
  </div>

  <script>
    // Supabase
    const SUPABASE_URL = 'https://tmtlfexxtksgsuqwkiz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_EnsF3AyVfnjry9qJUvqZHg_JIPAn7kK';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // State
    let currentUser = null;
    let currentMapId = null;
    let tree = null;
    let selectedNode = null;
    let clipboard = null;
    let lastUpdatedAt = null;
    let syncTimer = null;
    let bgImage = null;

    const COLORS = ['#6c63ff','#ff6584','#4caf87','#ffb74d','#42a5f5','#ef5350','#ab47bc','#26c6da','#78909c','#f06292'];
    const TEXT_COLORS = ['#1a1d2e','#ffffff','#6c63ff','#ff6584','#4caf87','#ffb74d','#42a5f5','#ef5350'];

    // Utils
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    function showLoading(show) {
      let overlay = document.querySelector('.loading-overlay');
      if (show) {
        if (!overlay) {
          overlay = document.createElement('div');
          overlay.className = 'loading-overlay';
          overlay.innerHTML = '<div class="spinner"></div>';
          document.body.appendChild(overlay);
        }
      } else {
        if (overlay) overlay.remove();
      }
    }

    function createNode(text = '新节点') {
      return {
        id: generateId(),
        label: text,
        note: '',
        bg: COLORS[Math.floor(Math.random() * COLORS.length)],
        color: '#ffffff',
        fontsize: 14,
        children: [],
        collapsed: false,
        x: 0,
        y: 0,
        _w: 0,
        _h: 0
      };
    }

    function findNode(node, id) {
      if (node.id === id) return node;
      for (let child of node.children) {
        const found = findNode(child, id);
        if (found) return found;
      }
      return null;
    }

    function findParent(node, id, parent = null) {
      if (node.id === id) return parent;
      for (let child of node.children) {
        const found = findParent(child, id, node);
        if (found) return found;
      }
      return null;
    }

    function getSubtreeNodes(node) {
      const nodes = [node];
      for (let child of node.children) {
        nodes.push(...getSubtreeNodes(child));
      }
      return nodes;
    }

    function deepCloneNode(node) {
      const clone = JSON.parse(JSON.stringify(node));
      function regenerateIds(n) {
        n.id = generateId();
        n.children.forEach(regenerateIds);
      }
      regenerateIds(clone);
      return clone;
    }

    // Layout
    const SEP_X = 200;
    const SEP_Y = 20;

    function layoutTree() {
      if (!tree) return;
      
      function measureNode(node) {
        const tempText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        tempText.textContent = node.label;
        tempText.setAttribute('font-size', node.fontsize || 14);
        document.getElementById('svg-canvas').appendChild(tempText);
        const bbox = tempText.getBBox();
        tempText.remove();
        
        const w = Math.max(80, bbox.width + 32);
        const h = bbox.height + 20;
        node._w = w;
        node._h = h;
      }

      function layout(node, x, y) {
        measureNode(node);
        node.x = x;
        node.y = y;
        
        if (node.collapsed || node.children.length === 0) return;
        
        let childY = y;
        const totalHeight = node.children.reduce((sum, c) => sum + c._h, 0) + (node.children.length - 1) * SEP_Y;
        childY = y - totalHeight / 2 + node._h / 2;
        
        for (let child of node.children) {
          layout(child, x + SEP_X, childY);
          childY += child._h + SEP_Y;
        }
      }

      layout(tree, 0, 0);

      // Check if re-layout needed
      function checkHeight(node) {
        const tempText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        tempText.textContent = node.label;
        tempText.setAttribute('font-size', node.fontsize || 14);
        document.getElementById('svg-canvas').appendChild(tempText);
        const bbox = tempText.getBBox();
        tempText.remove();
        
        const actualH = bbox.height + 20;
        if (Math.abs(actualH - node._h) > 10) {
          node._h = actualH;
          return true;
        }
        return node.children.some(checkHeight);
      }

      if (checkHeight(tree)) {
        requestAnimationFrame(() => layout(tree, 0, 0));
      }
    }

    // Render
    function render() {
      if (!tree) return;
      
      const svg = document.getElementById('svg-canvas');
      svg.innerHTML = '';
      
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.id = 'main-group';
      svg.appendChild(g);

      // Background image
      if (bgImage) {
        const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
        img.setAttribute('href', bgImage.url);
        img.setAttribute('x', bgImage.x);
        img.setAttribute('y', bgImage.y);
        img.setAttribute('width', bgImage.w);
        img.setAttribute('height', bgImage.h);
        img.setAttribute('opacity', bgImage.opacity);
        g.appendChild(img);
      }

      function renderNode(node, parent) {
        const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        group.setAttribute('data-id', node.id);
        group.classList.add('node');
        
        // Draw connection line
        if (parent) {
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          const px = parent.x + parent._w;
          const py = parent.y + parent._h / 2;
          const cx = node.x;
          const cy = node.y + node._h / 2;
          const mx = (px + cx) / 2;
          path.setAttribute('d', `M${px},${py} C${mx},${py} ${mx},${cy} ${cx},${cy}`);
          path.setAttribute('stroke', '#6b7499');
          path.setAttribute('stroke-width', '2');
          path.setAttribute('fill', 'none');
          g.appendChild(path);
        }

        // Node rect
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', node.x);
        rect.setAttribute('y', node.y);
        rect.setAttribute('width', node._w);
        rect.setAttribute('height', node._h);
        rect.setAttribute('rx', '8');
        rect.setAttribute('fill', node.bg);
        rect.setAttribute('stroke', selectedNode === node.id ? 'var(--accent)' : 'transparent');
        rect.setAttribute('stroke-width', '2');
        group.appendChild(rect);

        // Node text
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', node.x + node._w / 2);
        text.setAttribute('y', node.y + node._h / 2);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'middle');
        text.setAttribute('fill', node.color);
        text.setAttribute('font-size', node.fontsize);
        text.textContent = node.label;
        group.appendChild(text);

        // Collapse button
        if (node.children.length > 0) {
          const btn = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          btn.setAttribute('transform', `translate(${node.x + node._w + 5}, ${node.y + node._h / 2 - 8})`);
          btn.style.cursor = 'pointer';
          
          const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('r', '8');
          circle.setAttribute('fill', '#fff');
          circle.setAttribute('stroke', '#6b7499');
          btn.appendChild(circle);
          
          const symbol = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          symbol.setAttribute('text-anchor', 'middle');
          symbol.setAttribute('dominant-baseline', 'middle');
          symbol.setAttribute('font-size', '12');
          symbol.textContent = node.collapsed ? '+' : '−';
          btn.appendChild(symbol);
          
          btn.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            toggleCollapse(node.id);
          });
          group.appendChild(btn);
        }

        // Events
        group.addEventListener('dblclick', (e) => {
          e.stopPropagation();
          selectedNode = node.id;
          openSidebar(node);
          render();
        });
        
        group.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          e.stopPropagation();
          selectedNode = node.id;
          showContextMenu(e.clientX, e.clientY, node);
          render();
        });
        
        group.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          selectedNode = node.id;
          startDrag(e, node);
          render();
        });

        g.appendChild(group);

        if (!node.collapsed) {
          node.children.forEach(child => renderNode(child, node));
        }
      }

      renderNode(tree, null);
      updateMinimap();
    }

    function updateMinimap() {
      const minimapSvg = document.getElementById('minimap-svg');
      minimapSvg.innerHTML = '';
      
      if (!tree) return;
      
      const nodes = getSubtreeNodes(tree);
      if (nodes.length === 0) return;
      
      const minX = Math.min(...nodes.map(n => n.x));
      const maxX = Math.max(...nodes.map(n => n.x + n._w));
      const minY = Math.min(...nodes.map(n => n.y));
      const maxY = Math.max(...nodes.map(n => n.y + n._h));
      
      const padding = 20;
      const viewWidth = maxX - minX + padding * 2;
      const viewHeight = maxY - minY + padding * 2;
      
      minimapSvg.setAttribute('viewBox', `${minX - padding} ${minY - padding} ${viewWidth} ${viewHeight}`);
      
      nodes.forEach(node => {
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', node.x);
        rect.setAttribute('y', node.y);
        rect.setAttribute('width', node._w);
        rect.setAttribute('height', node._h);
        rect.setAttribute('fill', node.bg);
        minimapSvg.appendChild(rect);
      });
    }

    function toggleCollapse(id) {
      const node = findNode(tree, id);
      if (node) {
        node.collapsed = !node.collapsed;
        layoutTree();
        render();
      }
    }

    function openSidebar(node) {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.add('open');
      
      document.getElementById('node-label').value = node.label;
      document.getElementById('node-note').value = node.note || '';
      document.getElementById('node-fontsize').value = node.fontsize || 14;
      
      // Render color palettes
      const bgColors = document.getElementById('bg-colors');
      bgColors.innerHTML = '';
      COLORS.forEach(color => {
        const dot = document.createElement('div');
        dot.className = 'color-dot' + (node.bg === color ? ' active' : '');
        dot.style.background = color;
        dot.onclick = () => {
          node.bg = color;
          render();
          openSidebar(node);
        };
        bgColors.appendChild(dot);
      });
      
      const textColors = document.getElementById('text-colors');
      textColors.innerHTML = '';
      TEXT_COLORS.forEach(color => {
        const dot = document.createElement('div');
        dot.className = 'color-dot' + (node.color === color ? ' active' : '');
        dot.style.background = color;
        dot.onclick = () => {
          node.color = color;
          render();
          openSidebar(node);
        };
        textColors.appendChild(dot);
      });
    }

    // Drag
    let dragState = null;
    
    function startDrag(e, node) {
      e.stopPropagation();
      const subtreeNodes = getSubtreeNodes(node);
      const snapshots = subtreeNodes.map(n => ({ id: n.id, x: n.x, y: n.y }));
      
      dragState = {
        node,
        startX: e.clientX,
        startY: e.clientY,
        snapshots
      };
      
      document.getElementById('svg-canvas').classList.add('dragging');
    }

    document.addEventListener('mousemove', (e) => {
      if (!dragState) return;
      
      const svg = document.getElementById('svg-canvas');
      const mainGroup = document.getElementById('main-group');
      const transform = mainGroup.getAttribute('transform');
      let scale = 1;
      if (transform) {
        const match = transform.match(/scale\(([^)]+)\)/);
        if (match) scale = parseFloat(match[1]);
      }
      
      const dx = (e.clientX - dragState.startX) / scale;
      const dy = (e.clientY - dragState.startY) / scale;
      
      dragState.snapshots.forEach(snap => {
        const node = findNode(tree, snap.id);
        if (node) {
          node.x = snap.x + dx;
          node.y = snap.y + dy;
        }
      });
      
      render();
    });

    document.addEventListener('mouseup', () => {
      if (dragState) {
        document.getElementById('svg-canvas').classList.remove('dragging');
        dragState = null;
      }
    });

    // Pan & Zoom
    let panZoom = { x: 0, y: 0, scale: 1 };
    
    function applyTransform() {
      const mainGroup = document.getElementById('main-group');
      if (mainGroup) {
        mainGroup.setAttribute('transform', `translate(${panZoom.x}, ${panZoom.y}) scale(${panZoom.scale})`);
      }
    }

    document.getElementById('svg-canvas').addEventListener('wheel', (e) => {
      e.preventDefault();
      
      if (e.ctrlKey) {
        // Zoom
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        panZoom.scale *= delta;
        panZoom.scale = Math.max(0.1, Math.min(3, panZoom.scale));
      } else {
        // Pan
        panZoom.x -= e.deltaX;
        panZoom.y -= e.deltaY;
      }
      
      applyTransform();
      updateMinimap();
    });

    let isPanning = false;
    let panStart = { x: 0, y: 0 };
    
    document.getElementById('svg-canvas').addEventListener('mousedown', (e) => {
      if (e.target.tagName === 'svg') {
        isPanning = true;
        panStart = { x: e.clientX, y: e.clientY };
        document.getElementById('svg-canvas').classList.add('dragging');
      }
    });

    document.addEventListener('mousemove', (e) => {
      if (isPanning) {
        panZoom.x += e.clientX - panStart.x;
        panZoom.y += e.clientY - panStart.y;
        panStart = { x: e.clientX, y: e.clientY };
        applyTransform();
        updateMinimap();
      }
    });

    document.addEventListener('mouseup', () => {
      if (isPanning) {
        isPanning = false;
        document.getElementById('svg-canvas').classList.remove('dragging');
      }
    });

    function fitView() {
      if (!tree) return;
      
      const nodes = getSubtreeNodes(tree);
      if (nodes.length === 0) return;
      
      const svg = document.getElementById('svg-canvas');
      const rect = svg.getBoundingClientRect();
      
      const minX = Math.min(...nodes.map(n => n.x));
      const maxX = Math.max(...nodes.map(n => n.x + n._w));
      const minY = Math.min(...nodes.map(n => n.y));
      const maxY = Math.max(...nodes.map(n => n.y + n._h));
      
      const padding = 100;
      const viewWidth = maxX - minX + padding * 2;
      const viewHeight = maxY - minY + padding * 2;
      
      const scaleX = rect.width / viewWidth;
      const scaleY = rect.height / viewHeight;
      const scale = Math.min(scaleX, scaleY, 1);
      
      panZoom.scale = scale;
      panZoom.x = rect.width / 2 - (minX + (maxX - minX) / 2) * scale;
      panZoom.y = rect.height / 2 - (minY + (maxY - minY) / 2) * scale;
      
      applyTransform();
    }

    // Context Menu
    let contextMenu = null;
    
    function showContextMenu(x, y, node) {
      hideContextMenu();
      
      contextMenu = document.createElement('div');
      contextMenu.className = 'context-menu';
      contextMenu.style.left = x + 'px';
      contextMenu.style.top = y + 'px';
      
      const items = [
        { label: '添加子节点', action: () => addChild(node.id) },
        { label: '添加同级', action: () => addSibling(node.id) },
        { label: '编辑', action: () => openSidebar(node) },
        { label: node.collapsed ? '展开' : '折叠', action: () => toggleCollapse(node.id) },
        { label: '剪切分支', action: () => cutBranch(node.id) },
        { label: '粘贴为子节点', action: () => pasteAsChild(node.id) },
        { label: '删除', action: () => deleteNode(node.id) }
      ];
      
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'context-menu-item';
        div.textContent = item.label;
        div.onclick = () => {
          item.action();
          hideContextMenu();
        };
        contextMenu.appendChild(div);
      });
      
      document.body.appendChild(contextMenu);
    }

    function hideContextMenu() {
      if (contextMenu) {
        contextMenu.remove();
        contextMenu = null;
      }
    }

    document.addEventListener('click', hideContextMenu);

    // Node Operations
    function addChild(parentId) {
      const parent = findNode(tree, parentId);
      if (parent) {
        const newNode = createNode('新节点');
        parent.children.push(newNode);
        parent.collapsed = false;
        layoutTree();
        render();
      }
    }

    function addSibling(nodeId) {
      const parent = findParent(tree, nodeId);
      if (parent) {
        const newNode = createNode('新节点');
        const idx = parent.children.findIndex(c => c.id === nodeId);
        parent.children.splice(idx + 1, 0, newNode);
        layoutTree();
        render();
      }
    }

    function deleteNode(nodeId) {
      if (nodeId === tree.id) return;
      const parent = findParent(tree, nodeId);
      if (parent) {
        parent.children = parent.children.filter(c => c.id !== nodeId);
        layoutTree();
        render();
      }
    }

    function cutBranch(nodeId) {
      if (nodeId === tree.id) return;
      const node = findNode(tree, nodeId);
      if (node) {
        clipboard = deepCloneNode(node);
        deleteNode(nodeId);
      }
    }

    function pasteAsChild(parentId) {
      if (!clipboard) return;
      const parent = findNode(tree, parentId);
      if (parent) {
        const newNode = deepCloneNode(clipboard);
        parent.children.push(newNode);
        parent.collapsed = false;
        layoutTree();
        render();
      }
    }

    // Keyboard Shortcuts
    document.addEventListener('keydown', (e) => {
      if (!currentMapId || !selectedNode) return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      
      const node = findNode(tree, selectedNode);
      if (!node) return;
      
      if (e.key === 'Tab') {
        e.preventDefault();
        addChild(node.id);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        addSibling(node.id);
      } else if (e.key === 'Delete') {
        e.preventDefault();
        deleteNode(node.id);
      } else if (e.key === 'F2') {
        e.preventDefault();
        openSidebar(node);
      } else if (e.key === ' ') {
        e.preventDefault();
        centerNode(node);
      } else if (e.ctrlKey && e.key === 'x') {
        e.preventDefault();
        cutBranch(node.id);
      } else if (e.ctrlKey && e.key === 'v') {
        e.preventDefault();
        pasteAsChild(node.id);
      } else if (e.key === 'Escape') {
        document.getElementById('sidebar').classList.remove('open');
      }
    });

    function centerNode(node) {
      const svg = document.getElementById('svg-canvas');
      const rect = svg.getBoundingClientRect();
      
      panZoom.x = rect.width / 2 - (node.x + node._w / 2) * panZoom.scale;
      panZoom.y = rect.height / 2 - (node.y + node._h / 2) * panZoom.scale;
      
      applyTransform();
    }

    // Sidebar Events
    document.getElementById('node-label').addEventListener('input', (e) => {
      if (!selectedNode) return;
      const node = findNode(tree, selectedNode);
      if (node) {
        node.label = e.target.value;
        layoutTree();
        render();
      }
    });

    document.getElementById('node-note').addEventListener('input', (e) => {
      if (!selectedNode) return;
      const node = findNode(tree, selectedNode);
      if (node) {
        node.note = e.target.value;
      }
    });

    document.getElementById('node-fontsize').addEventListener('input', (e) => {
      if (!selectedNode) return;
      const node = findNode(tree, selectedNode);
      if (node) {
        node.fontsize = parseInt(e.target.value) || 14;
        layoutTree();
        render();
      }
    });

    // Auth
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-form').classList.add('active');
      });
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('login-error');
      errorDiv.textContent = '';
      
      showLoading(true);
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      showLoading(false);
      
      if (error) {
        errorDiv.textContent = error.message;
        return;
      }
      
      currentUser = data.user;
      await loadUserProfile();
      showListView();
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('register-email').value;
      const username = document.getElementById('register-username').value;
      const password = document.getElementById('register-password').value;
      const passwordConfirm = document.getElementById('register-password-confirm').value;
      const errorDiv = document.getElementById('register-error');
      errorDiv.textContent = '';
      
      if (password !== passwordConfirm) {
        errorDiv.textContent = '两次密码输入不一致';
        return;
      }
      
      showLoading(true);
      const { data, error } = await supabase.auth.signUp({ email, password });
      
      if (error) {
        showLoading(false);
        errorDiv.textContent = error.message;
        return;
      }
      
      const { error: profileError } = await supabase.from('profiles').insert({
        id: data.user.id,
        username: username
      });
      
      showLoading(false);
      
      if (profileError) {
        if (profileError.code === '23505') {
          errorDiv.textContent = '该用户名已被使用';
          await supabase.auth.signOut();
        } else {
          errorDiv.textContent = profileError.message;
        }
        return;
      }
      
      currentUser = data.user;
      await loadUserProfile();
      showListView();
    });

    async function loadUserProfile() {
      const { data } = await supabase.from('profiles').select('username').eq('id', currentUser.id).single();
      if (data) {
        document.getElementById('current-username').textContent = data.username;
      }
    }

    supabase.auth.onAuthStateChange((event, session) => {

    // Views

    }

    function showListView() {

      document.getElementById('list-view').classList.remove('hidden');
      document.getElementById('editor-view').classList.add('hidden');
      loadMapList();
    }

    function showEditorView() {
      document.getElementById('auth-view').classList.add('hidden');
      document.getElementById('list-view').classList.add('hidden');
      document.getElementById('editor-view').classList.remove('hidden');
    }

    // List View
    async function loadMapList() {
      const grid = document.getElementById('map-grid');
      grid.innerHTML = '';
      
      // Load owned maps
      const { data: owned } = await supabase
        .from('mindmaps')
        .select('*')
        .eq('owner_id', currentUser.id)
        .order('created_at', { ascending: false });
      
      // Load shared maps
      const { data: collabs } = await supabase
        .from('collaborators')
        .select('mindmap_id')
        .eq('user_id', currentUser.id);
      
      let shared = [];
      if (collabs && collabs.length > 0) {
        const ids = collabs.map(c => c.mindmap_id);
        const { data } = await supabase
          .from('mindmaps')
          .select('*')
          .in('id', ids)
          .order('created_at', { ascending: false });
        shared = data || [];
      }
      
      owned.forEach(map => {
        grid.appendChild(createMapCard(map, true));
      });
      
      shared.forEach(map => {
        grid.appendChild(createMapCard(map, false));
      });
    }

    function createMapCard(map, isOwner) {
      const card = document.createElement('div');
      card.className = 'map-card';
      
      const createdDate = new Date(map.created_at).toLocaleString('zh-CN');
      
      card.innerHTML = `
        <div class="map-card-header">
          <div class="map-card-title">${map.title}</div>
          <div class="map-card-tag ${isOwner ? '' : 'shared'}">${isOwner ? '我创建的' : '共享给我的'}</div>
        </div>
        <div class="map-card-time">${createdDate}</div>
        <div class="map-card-actions">
          <button class="btn-edit">进入编辑</button>
          ${isOwner ? '<button class="btn-delete">删除</button>' : ''}
        </div>
      `;
      
      card.querySelector('.btn-edit').onclick = () => openMap(map.id);
      if (isOwner) {
        card.querySelector('.btn-delete').onclick = async (e) => {
          e.stopPropagation();
          if (confirm('确定删除这个导图吗？')) {
            await supabase.from('mindmaps').delete().eq('id', map.id);
            loadMapList();
          }
        };
      }
      
      return card;
    }

    document.getElementById('new-map-btn').onclick = async () => {
      const title = prompt('请输入导图标题', '未命名导图');

      const newTree = createNode('中心主题');
      const { data } = await supabase.from('mindmaps').insert({

      }).select().single();

    // Editor View
    async function openMap(id) {

      showEditorView();
      await loadData();
      layoutTree();
      render();
      fitView();
      startSyncPolling();
    }

    async function loadData() {
      const { data } = await supabase.from('mindmaps').select('*').eq('id', currentMapId).single();
      if (data) {
        tree = JSON.parse(data.tree);
        document.getElementById('title-input').value = data.title;
        lastUpdatedAt = data.updated_at;
      }
    }

    async function saveData() {
      const statusEl = document.getElementById('sync-status');
      statusEl.className = 'sync-status syncing';
      statusEl.textContent = '同步中...';
      
      const title = document.getElementById('title-input').value;
      const { error } = await supabase.from('mindmaps').update({
        tree: JSON.stringify(tree),
        title: title,
        updated_at: new Date().toISOString()
      }).eq('id', currentMapId);
      
      if (error) {
        statusEl.className = 'sync-status failed';
        statusEl.textContent = '同步失败';
      } else {
        statusEl.className = 'sync-status synced';
        statusEl.textContent = '已同步';
        lastUpdatedAt = new Date().toISOString();
      }
    }

    function startSyncPolling() {
      if (syncTimer) clearInterval(syncTimer);
      syncTimer = setInterval(async () => {
        const { data } = await supabase.from('mindmaps').select('updated_at').eq('id', currentMapId).single();
        if (data && data.updated_at !== lastUpdatedAt) {
          await loadData();
          layoutTree();
          render();
          showToast('已同步他人更新 🔄');
        }
      }, 10000);
    }

    document.getElementById('back-btn').onclick = () => {

      currentMapId = null;
      tree = null;
      showListView();
    };

    document.getElementById('title-input').addEventListener('input', () => {
      saveData();

            <div class="import-tab" data-tab="image">PNG/JPG</div>

          <div class="import-content" data-content="image">
            <div class="file-input-wrapper">
              <input type="file" id="image-file" accept=".png,.jpg,.jpeg">
            </div>
            <div class="form-group">
              <label>透明度</label>
              <input type="range" id="image-opacity" min="0" max="1" step="0.1" value="0.5">
            </div>
          </div>
          <div class="import-content" data-content="json">
            <div class="file-input-wrapper">
              <input type="file" id="json-file" accept=".json">
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
            <button class="btn btn-primary" id="import-confirm">导入</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      
      let activeTab = 'xmind';
      
      modal.querySelectorAll('.import-tab').forEach(tab => {
        tab.onclick = () => {
          modal.querySelectorAll('.import-tab').forEach(t => t.classList.remove('active'));
          modal.querySelectorAll('.import-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          activeTab = tab.dataset.tab;
          modal.querySelector(`[data-content="${activeTab}"]`).classList.add('active');
        };
      });
      
      document.getElementById('import-confirm').onclick = async () => {
        if (activeTab === 'xmind') {
          const file = document.getElementById('xmind-file').files[0];
          if (file) {
            const zip = await JSZip.loadAsync(file);
            const contentFile = zip.file('content.json');
            if (contentFile) {
              const content = JSON.parse(await contentFile.async('string'));
              if (content && content.length > 0) {
                const xmindTree = convertXmindTree(content[0].rootTopic);
                tree = xmindTree;
                document.getElementById('title-input').value = content[0].title || '导入的导图';
                layoutTree();
                render();
                fitView();
                saveData();
                modal.remove();
                showToast('导入成功');
              }
            }
          }
        } else if (activeTab === 'image') {
          const file = document.getElementById('image-file').files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
              bgImage = {
                url: e.target.result,
                x: 0,
                y: 0,
                w: 800,
                h: 600,
                opacity: parseFloat(document.getElementById('image-opacity').value)
              };
              render();
              modal.remove();
              showToast('背景已添加');
            };
            reader.readAsDataURL(file);
          }
        } else if (activeTab === 'json') {
          const file = document.getElementById('json-file').files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
              const data = JSON.parse(e.target.result);
              if (data.tree) {
                tree = data.tree;
                document.getElementById('title-input').value = data.title || '导入的导图';
                layoutTree();
                render();
                fitView();
                saveData();
                modal.remove();
                showToast('导入成功');
              }
            };
            reader.readAsText(file);
          }
        }
      };
    };

    function convertXmindTree(topic) {
      const node = createNode(topic.title);
      if (topic.children && topic.children.attached) {
        node.children = topic.children.attached.map(convertXmindTree);
      }
      return node;
    }

    document.getElementById('export-svg-btn').onclick = () => {
      const svg = document.getElementById('svg-canvas');
      const svgData = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([svgData], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'mindmap.svg';
      a.click();
      URL.revokeObjectURL(url);
    };

    document.getElementById('export-json-btn').onclick = () => {
      const data = {
        title: document.getElementById('title-input').value,
        tree: tree
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'mindmap.json';
      a.click();
      URL.revokeObjectURL(url);
    };

    // Auto-collapse if >10 children
    function autoCollapse() {
      function check(node) {
        if (node.children.length > 10) {
          node.collapsed = true;
        }
        node.children.forEach(check);
      }
      check(tree);
    }

    // Init
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        currentUser = session.user;
        await loadUserProfile();
        showListView();
      } else {
        showAuthView();
      }
    })();
  </script>
</body>
</html>
