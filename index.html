<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f8;color:#1a1d2e;height:100vh;overflow:hidden}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}

/* ===== VIEWS ===== */
.view{display:none;width:100%;height:100vh}
.view.active{display:flex;flex-direction:column}

/* ===== AUTH ===== */
#v-auth{align-items:center;justify-content:center;background:#f0f2f8}
.auth-box{background:#fff;border-radius:16px;padding:40px;width:400px;box-shadow:0 4px 24px rgba(108,99,255,.1)}
.auth-logo{font-size:32px;font-weight:700;text-align:center;margin-bottom:28px;color:#1a1d2e}
.auth-tabs{display:flex;border-bottom:2px solid #dde1f0;margin-bottom:24px}
.auth-tab{flex:1;padding:10px;text-align:center;cursor:pointer;color:#6b7499;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
.auth-tab.on{color:#6c63ff;border-bottom-color:#6c63ff}
.auth-panel{display:none}
.auth-panel.on{display:block}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:#6b7499;margin-bottom:6px;font-weight:500}
.field input{width:100%;padding:10px 12px;border:1.5px solid #dde1f0;border-radius:8px;font-size:14px;transition:.2s;background:#fff;color:#1a1d2e}
.field input:focus{outline:none;border-color:#6c63ff}
.err{color:#ef5350;font-size:13px;margin-top:4px;min-height:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border:none;border-radius:8px;font-size:14px;font-weight:500;transition:.15s;white-space:nowrap}
.btn-primary{background:#6c63ff;color:#fff}
.btn-primary:hover{background:#5a52e0}
.btn-secondary{background:#f0f2f8;color:#1a1d2e;border:1px solid #dde1f0}
.btn-secondary:hover{background:#e4e8f0}
.btn-danger{background:#ffebee;color:#ef5350;border:1px solid #ffcdd2}
.btn-danger:hover{background:#ffcdd2}
.btn-full{width:100%}
.btn-sm{padding:6px 12px;font-size:13px}

/* ===== LIST ===== */
#v-list{background:#f0f2f8}
.topbar{display:flex;align-items:center;gap:12px;padding:0 24px;height:56px;background:#fff;border-bottom:1px solid #dde1f0;flex-shrink:0}
.topbar-logo{font-size:20px;font-weight:700;margin-right:auto}
.list-body{flex:1;overflow-y:auto;padding:32px}
.list-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.list-head h2{font-size:22px;font-weight:700}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:#fff;border-radius:12px;padding:20px;border:1px solid #dde1f0;transition:.2s;cursor:default}
.card:hover{box-shadow:0 4px 16px rgba(108,99,255,.12);transform:translateY(-2px)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-title{font-size:16px;font-weight:600;flex:1;word-break:break-all}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge-own{background:#ede9ff;color:#6c63ff}
.badge-shared{background:#e3f2fd;color:#1976d2}
.card-time{font-size:12px;color:#6b7499;margin-bottom:12px}
.card-actions{display:flex;gap:8px}

/* ===== EDITOR ===== */
#v-editor{background:#f0f2f8}
.editor-bar{display:flex;align-items:center;gap:10px;padding:0 16px;height:52px;background:#fff;border-bottom:1px solid #dde1f0;flex-shrink:0}
.editor-title{flex:1;padding:6px 10px;border:1.5px solid transparent;border-radius:8px;font-size:16px;font-weight:600;color:#1a1d2e;background:transparent}
.editor-title:focus{outline:none;border-color:#6c63ff;background:#fff}
.sync-dot{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:4px 10px;border-radius:20px}
.sync-dot.ok{background:#e8f5e9;color:#2e7d32}
.sync-dot.ing{background:#fff8e1;color:#f57c00}
.sync-dot.err{background:#ffebee;color:#c62828}
.editor-body{flex:1;display:flex;overflow:hidden;position:relative}
#svg-wrap{flex:1;overflow:hidden;position:relative;cursor:grab}
#svg-wrap.panning{cursor:grabbing}
#main-svg{width:100%;height:100%;display:block}

/* ===== SIDEBAR ===== */
#sidebar{width:0;overflow:hidden;transition:width .25s;background:#fff;border-left:1px solid #dde1f0;flex-shrink:0}
#sidebar.open{width:280px}
#sidebar-inner{width:280px;padding:20px;overflow-y:auto;height:100%}
#sidebar h3{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.sidebar-close{background:none;border:none;font-size:18px;color:#6b7499;cursor:pointer}
.sidebar-close:hover{color:#1a1d2e}
.sb-field{margin-bottom:14px}
.sb-field label{display:block;font-size:12px;color:#6b7499;margin-bottom:6px;font-weight:500}
.sb-field input[type=text],.sb-field textarea,.sb-field input[type=number]{width:100%;padding:8px 10px;border:1.5px solid #dde1f0;border-radius:6px;font-size:14px;color:#1a1d2e}
.sb-field textarea{resize:vertical;min-height:72px}
.sb-field input:focus,.sb-field textarea:focus{outline:none;border-color:#6c63ff}
.swatches{display:flex;flex-wrap:wrap;gap:7px}
.swatch{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.15s}
.swatch.sel{border-color:#1a1d2e;transform:scale(1.15)}

/* ===== MINIMAP ===== */
#minimap{position:absolute;bottom:16px;right:16px;width:140px;height:90px;background:#fff;border:1px solid #dde1f0;border-radius:8px;overflow:hidden;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.08)}
#minimap svg{width:100%;height:100%}

/* ===== CTX MENU ===== */
#ctx-menu{position:fixed;display:none;background:#fff;border:1px solid #dde1f0;border-radius:10px;padding:6px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.12);min-width:160px}
#ctx-menu.show{display:block}
.ctx-item{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:14px;color:#1a1d2e;display:flex;align-items:center;gap:8px}
.ctx-item:hover{background:#f0f2f8}
.ctx-item.danger{color:#ef5350}
.ctx-sep{height:1px;background:#dde1f0;margin:4px 0}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(26,29,46,.4);display:flex;align-items:center;justify-content:center;z-index:8888}
.modal{background:#fff;border-radius:14px;padding:28px;width:480px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal h3{font-size:18px;font-weight:600;margin-bottom:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

/* import tabs */
.itabs{display:flex;border-bottom:2px solid #dde1f0;margin-bottom:20px}
.itab{padding:8px 16px;cursor:pointer;color:#6b7499;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
.itab.on{color:#6c63ff;border-bottom-color:#6c63ff}
.ipanel{display:none}
.ipanel.on{display:block}

/* collab search results */
.collab-result{padding:10px 12px;border:1px solid #dde1f0;border-radius:8px;margin-top:6px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px}
.collab-result:hover{background:#f0f2f8}
.collab-list-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border:1px solid #dde1f0;border-radius:8px;margin-bottom:6px;font-size:14px}
.rm-btn{background:none;border:none;color:#ef5350;font-size:18px;line-height:1;cursor:pointer}

/* ===== TOAST ===== */
.toast{position:fixed;top:20px;right:20px;background:#1a1d2e;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;z-index:99999;animation:toastIn .3s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* ===== SPINNER ===== */
.spinner-wrap{position:fixed;inset:0;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;z-index:99990}
.spinner{width:36px;height:36px;border:3px solid #dde1f0;border-top-color:#6c63ff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* resize handle on node */
.resize-handle{cursor:se-resize;fill:#6b7499;opacity:.7}
.resize-handle:hover{opacity:1}
</style>

<script>
'use strict';

// ─── Supabase ───────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://tmtlfeexxtksgsuqwkiz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_EnsF3AyVfnjry9qJUvqZHg_JIPAn7kK';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── Colors ─────────────────────────────────────────────────────────────────
const NODE_COLORS = ['#6c63ff','#ff6584','#4caf87','#ffb74d','#42a5f5','#ef5350','#ab47bc','#26c6da','#78909c','#f06292'];
const TEXT_COLORS = ['#ffffff','#1a1d2e','#ffb74d','#4caf87','#42a5f5','#ff6584','#ab47bc','#f0f2f8'];

// ─── State ───────────────────────────────────────────────────────────────────
let currentUser = null;
let currentProfile = null;
let currentMapId = null;
let currentMapOwnerId = null;
let tree = null;
let selectedNodeId = null;
let clipboard = null;
let localUpdatedAt = null;
let pollTimer = null;
let bgLayer = null; // {url, opacity}
let panX = 0, panY = 0, scale = 1;
let isPanning = false, panStartX = 0, panStartY = 0;
let isDraggingNode = false;
let dragNodeId = null;
let dragSnapshots = [];
let dragStartX = 0, dragStartY = 0;
let isResizing = false;
let resizeNodeId = null;
let resizeStartX = 0, resizeStartY = 0;
let resizeStartW = 0, resizeStartH = 0;

// ─── Utils ───────────────────────────────────────────────────────────────────
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
}

function toast(msg, dur = 2500) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

function showSpinner() {
  const w = document.createElement('div');
  w.className = 'spinner-wrap';
  w.id = 'global-spinner';
  w.innerHTML = '<div class="spinner"></div>';
  document.body.appendChild(w);
}
function hideSpinner() {
  document.getElementById('global-spinner')?.remove();
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function fmtDate(s) {
  return new Date(s).toLocaleString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

// ─── Node helpers ─────────────────────────────────────────────────────────────
function makeNode(label = '新节点', colorIdx) {
  const ci = colorIdx ?? Math.floor(Math.random() * NODE_COLORS.length);
  return {
    id: uid(),
    label,
    note: '',
    bg: NODE_COLORS[ci],
    color: '#ffffff',
    fontSize: 14,
    children: [],
    collapsed: false,
    x: 0, y: 0,
    _w: 0, _h: 0
  };
}

function findNode(root, id) {
  if (!root) return null;
  if (root.id === id) return root;
  for (const c of root.children) {
    const r = findNode(c, id);
    if (r) return r;
  }
  return null;
}

function findParent(root, id) {
  if (!root) return null;
  for (const c of root.children) {
    if (c.id === id) return root;
    const r = findParent(c, id);
    if (r) return r;
  }
  return null;
}

function subtreeNodes(node) {
  const list = [node];
  for (const c of node.children) list.push(...subtreeNodes(c));
  return list;
}

function deepCloneRegen(node) {
  const n = JSON.parse(JSON.stringify(node));
  function regen(x) { x.id = uid(); x.children.forEach(regen); }
  regen(n);
  return n;
}

// ─── Layout ──────────────────────────────────────────────────────────────────
const SEP_X = 200;

function measureNode(node) {
  // Measure via hidden SVG text
  const svg = document.getElementById('main-svg');
  const t = document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('font-size', node.fontSize || 14);
  t.textContent = node.label || ' ';
  svg.appendChild(t);
  const bbox = t.getBBox();
  svg.removeChild(t);
  const w = Math.max(80, bbox.width + 32);
  const h = bbox.height + 20;
  if (!node._w || node._w < 0.1) node._w = w;
  if (!node._h || node._h < 0.1) node._h = h;
  return {w, h};
}

function layoutTree(node, x, y) {
  if (!node) return 0;
  const { w, h } = measureNode(node);
  // Use stored size if manually resized, else measured
  const nw = node._manualW ? node._w : w;
  const nh = node._manualH ? node._h : h;
  node._w = nw;
  node._h = nh;
  node.x = x;

  if (node.collapsed || node.children.length === 0) {
    node.y = y;
    return nh;
  }

  const sepY = 20;
  const childX = x + SEP_X;
  let totalH = 0;
  const childHeights = [];
  for (const c of node.children) {
    const ch = layoutTree(c, childX, 0); // temp
    childHeights.push(ch);
    totalH += ch;
  }
  totalH += sepY * (node.children.length - 1);

  const startY = y - totalH / 2 + nh / 2;
  let curY = startY;
  for (let i = 0; i < node.children.length; i++) {
    layoutTree(node.children[i], childX, curY + childHeights[i] / 2 - node.children[i]._h / 2);
    // Actually we need to re-layout with correct y
    node.children[i].x = childX;
    positionSubtree(node.children[i], curY);
    curY += childHeights[i] + sepY;
  }

  node.y = y;
  return Math.max(nh, totalH);
}

function positionSubtree(node, y) {
  node.y = y;
  if (node.collapsed || node.children.length === 0) return;
  const sepY = 20;
  let totalH = 0;
  const childHeights = [];
  for (const c of node.children) {
    const ch = calcSubtreeHeight(c);
    childHeights.push(ch);
    totalH += ch;
  }
  totalH += sepY * (node.children.length - 1);

  const startY = y + node._h / 2 - totalH / 2;
  let curY = startY;
  for (let i = 0; i < node.children.length; i++) {
    const c = node.children[i];
    c.x = node.x + SEP_X;
    positionSubtree(c, curY + childHeights[i] / 2 - c._h / 2);
    curY += childHeights[i] + sepY;
  }
}

function calcSubtreeHeight(node) {
  if (!node._h) measureNode(node);
  if (node.collapsed || node.children.length === 0) return node._h;
  const sepY = 20;
  let total = 0;
  for (const c of node.children) total += calcSubtreeHeight(c);
  total += sepY * (node.children.length - 1);
  return Math.max(node._h, total);
}

function doLayout() {
  if (!tree) return;
  // First pass: measure all
  function measureAll(n) {
    measureNode(n);
    n.children.forEach(measureAll);
  }
  measureAll(tree);
  // Layout from root center
  const totalH = calcSubtreeHeight(tree);
  positionSubtree(tree, -totalH / 2 + tree._h / 2);
  tree.x = 0;
  tree.y = -tree._h / 2;

  // Check if any node's real height differs from estimated by >10px, redo once
  let needRedo = false;
  function checkRedo(n) {
    const { h } = measureNode(n);
    if (Math.abs(h - n._h) > 10 && !n._manualH) { n._h = h; needRedo = true; }
    n.children.forEach(checkRedo);
  }
  checkRedo(tree);
  if (needRedo) {
    requestAnimationFrame(() => {
      positionSubtree(tree, -calcSubtreeHeight(tree) / 2 + tree._h / 2);
      render();
    });
  }
}

// Auto-collapse nodes with >10 children on first load
function autoCollapse(node) {
  if (node.children.length > 10) node.collapsed = true;
  node.children.forEach(autoCollapse);
}

// ─── Render ───────────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs = {}) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function render() {
  if (!tree) return;
  const svg = document.getElementById('main-svg');
  svg.innerHTML = '';

  // transform group
  const g = el('g', { id: 'world', transform: `translate(${panX},${panY}) scale(${scale})` });
  svg.appendChild(g);

  // bg layer
  if (bgLayer) {
    const img = el('image', {
      href: bgLayer.url,
      x: bgLayer.x ?? -400,
      y: bgLayer.y ?? -300,
      width: bgLayer.w ?? 800,
      height: bgLayer.h ?? 600,
      opacity: bgLayer.opacity ?? 0.5,
      preserveAspectRatio: 'xMidYMid meet'
    });
    g.appendChild(img);
  }

  // Edges first (rendered under nodes)
  const edgeG = el('g', { id: 'edges' });
  g.appendChild(edgeG);
  const nodeG = el('g', { id: 'nodes' });
  g.appendChild(nodeG);

  function renderEdge(parent, child) {
    const x1 = parent.x + parent._w;
    const y1 = parent.y + parent._h / 2;
    const x2 = child.x;
    const y2 = child.y + child._h / 2;
    const mx = (x1 + x2) / 2;
    const path = el('path', {
      d: `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`,
      stroke: '#b0b7d4',
      'stroke-width': '2',
      fill: 'none'
    });
    edgeG.appendChild(path);
  }

  function renderNode(node, parent) {
    if (parent) renderEdge(parent, node);

    const g2 = el('g', { 'data-id': node.id, style: 'cursor:pointer' });

    // Background rect
    const rect = el('rect', {
      x: node.x, y: node.y,
      width: node._w, height: node._h,
      rx: 8, ry: 8,
      fill: node.bg || '#6c63ff',
      stroke: selectedNodeId === node.id ? '#1a1d2e' : 'none',
      'stroke-width': 2
    });
    g2.appendChild(rect);

    // Label text
    const txt = el('text', {
      x: node.x + node._w / 2,
      y: node.y + node._h / 2,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      fill: node.color || '#ffffff',
      'font-size': node.fontSize || 14,
      'pointer-events': 'none'
    });
    txt.textContent = node.label;
    g2.appendChild(txt);

    // Resize handle (bottom-right)
    const handleSize = 10;
    const hx = node.x + node._w - handleSize;
    const hy = node.y + node._h - handleSize;
    const handle = el('rect', {
      x: hx, y: hy,
      width: handleSize, height: handleSize,
      fill: 'rgba(0,0,0,.3)',
      rx: 2,
      class: 'resize-handle',
      'data-resize': node.id,
      cursor: 'se-resize'
    });
    const handleTxt = el('text', {
      x: hx + handleSize / 2,
      y: hy + handleSize / 2,
      'text-anchor': 'middle',
      'dominant-baseline': 'central',
      fill: '#fff',
      'font-size': 7,
      'pointer-events': 'none'
    });
    handleTxt.textContent = '⤡';
    g2.appendChild(handle);
    g2.appendChild(handleTxt);

    // Collapse button (right of node if has children)
    if (node.children.length > 0) {
      const btnG = el('g', {
        transform: `translate(${node.x + node._w + 8},${node.y + node._h / 2 - 8})`,
        style: 'cursor:pointer',
        'data-collapse': node.id
      });
      const circle = el('circle', { cx: 8, cy: 8, r: 8, fill: '#fff', stroke: '#b0b7d4', 'stroke-width': 1.5 });
      const cTxt = el('text', {
        x: 8, y: 8,
        'text-anchor': 'middle',
        'dominant-baseline': 'central',
        'font-size': 11,
        fill: '#6b7499',
        'pointer-events': 'none'
      });
      cTxt.textContent = node.collapsed ? '+' : '−';
      btnG.appendChild(circle);
      btnG.appendChild(cTxt);
      g2.appendChild(btnG);

      btnG.addEventListener('mousedown', e => { e.stopPropagation(); });
      btnG.addEventListener('click', e => {
        e.stopPropagation();
        node.collapsed = !node.collapsed;
        doLayout();
        render();
      });
    }

    // Node events
    g2.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.stopPropagation();
      // Don't start drag on resize handle
      if (e.target.hasAttribute('data-resize') || e.target.getAttribute('data-collapse') !== null) return;
      selectedNodeId = node.id;
      isDraggingNode = true;
      dragNodeId = node.id;
      // Snapshot all subtree positions in SVG coordinates
      const sub = subtreeNodes(node);
      dragSnapshots = sub.map(n => ({ id: n.id, x: n.x, y: n.y }));
      const svgPt = screenToWorld(e.clientX, e.clientY);
      dragStartX = svgPt.x;
      dragStartY = svgPt.y;
      render();
    });

    g2.addEventListener('dblclick', e => {
      e.stopPropagation();
      selectedNodeId = node.id;
      openSidebar(node);
      render();
    });

    g2.addEventListener('contextmenu', e => {
      e.preventDefault();
      e.stopPropagation();
      selectedNodeId = node.id;
      render();
      showCtxMenu(e.clientX, e.clientY, node);
    });

    // Resize handle events
    handle.addEventListener('mousedown', e => {
      e.stopPropagation();
      isResizing = true;
      resizeNodeId = node.id;
      const svgPt = screenToWorld(e.clientX, e.clientY);
      resizeStartX = svgPt.x;
      resizeStartY = svgPt.y;
      resizeStartW = node._w;
      resizeStartH = node._h;
    });

    nodeG.appendChild(g2);

    if (!node.collapsed) {
      for (const child of node.children) renderNode(child, node);
    }
  }

  renderNode(tree, null);
  renderMinimap();
}

// ─── Minimap ─────────────────────────────────────────────────────────────────
function renderMinimap() {
  if (!tree) return;
  const mmSvg = document.getElementById('mm-svg');
  mmSvg.innerHTML = '';
  const nodes = subtreeNodes(tree);
  if (!nodes.length) return;

  const xs = nodes.map(n => n.x);
  const ys = nodes.map(n => n.y);
  const x2s = nodes.map(n => n.x + n._w);
  const y2s = nodes.map(n => n.y + n._h);
  const minX = Math.min(...xs), maxX = Math.max(...x2s);
  const minY = Math.min(...ys), maxY = Math.max(...y2s);
  const pad = 10;
  mmSvg.setAttribute('viewBox', `${minX - pad} ${minY - pad} ${maxX - minX + pad*2} ${maxY - minY + pad*2}`);
  mmSvg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  for (const n of nodes) {
    const r = document.createElementNS(SVG_NS, 'rect');
    r.setAttribute('x', n.x); r.setAttribute('y', n.y);
    r.setAttribute('width', n._w); r.setAttribute('height', n._h);
    r.setAttribute('rx', 4); r.setAttribute('fill', n.bg || '#6c63ff');
    mmSvg.appendChild(r);
  }
}

// ─── Pan/Zoom coords ──────────────────────────────────────────────────────────
function screenToWorld(sx, sy) {
  const wrap = document.getElementById('svg-wrap');
  const rect = wrap.getBoundingClientRect();
  return { x: (sx - rect.left - panX) / scale, y: (sy - rect.top - panY) / scale };
}

function fitView() {
  if (!tree) return;
  const nodes = subtreeNodes(tree);
  if (!nodes.length) return;
  const wrap = document.getElementById('svg-wrap');
  const wr = wrap.getBoundingClientRect();
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const x2s = nodes.map(n => n.x + n._w), y2s = nodes.map(n => n.y + n._h);
  const minX = Math.min(...xs), maxX = Math.max(...x2s);
  const minY = Math.min(...ys), maxY = Math.max(...y2s);
  const pad = 60;
  const sw = maxX - minX + pad * 2;
  const sh = maxY - minY + pad * 2;
  scale = Math.min(wr.width / sw, wr.height / sh, 1.5);
  panX = wr.width / 2 - (minX + (maxX - minX) / 2) * scale;
  panY = wr.height / 2 - (minY + (maxY - minY) / 2) * scale;
  applyTransform();
}

function applyTransform() {
  const world = document.getElementById('world');
  if (world) world.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
}

// ─── SVG Wrap events ─────────────────────────────────────────────────────────
const svgWrap = document.getElementById('svg-wrap');

svgWrap.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    // Zoom
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const rect = svgWrap.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    panX = mx - factor * (mx - panX);
    panY = my - factor * (my - panY);
    scale = Math.min(Math.max(scale * factor, 0.1), 5);
  } else {
    panX -= e.deltaX;
    panY -= e.deltaY;
  }
  applyTransform();
  renderMinimap();
}, { passive: false });

svgWrap.addEventListener('mousedown', e => {
  if (e.button === 0 && !isDraggingNode && !isResizing) {
    if (e.target === svgWrap || e.target.id === 'main-svg' || e.target.id === 'world' || e.target.id === 'edges') {
      isPanning = true;
      panStartX = e.clientX; panStartY = e.clientY;
      svgWrap.classList.add('panning');
    }
  }
});

document.addEventListener('mousemove', e => {
  if (isPanning) {
    panX += e.clientX - panStartX;
    panY += e.clientY - panStartY;
    panStartX = e.clientX; panStartY = e.clientY;
    applyTransform();
    renderMinimap();
  }
  if (isDraggingNode && dragNodeId) {
    const svgPt = screenToWorld(e.clientX, e.clientY);
    const dx = svgPt.x - dragStartX;
    const dy = svgPt.y - dragStartY;
    for (const snap of dragSnapshots) {
      const n = findNode(tree, snap.id);
      if (n) { n.x = snap.x + dx; n.y = snap.y + dy; }
    }
    render();
  }
  if (isResizing && resizeNodeId) {
    const svgPt = screenToWorld(e.clientX, e.clientY);
    const n = findNode(tree, resizeNodeId);
    if (n) {
      n._w = Math.max(60, resizeStartW + (svgPt.x - resizeStartX));
      n._h = Math.max(24, resizeStartH + (svgPt.y - resizeStartY));
      n._manualW = true; n._manualH = true;
      render();
    }
  }
});

document.addEventListener('mouseup', () => {
  isPanning = false;
  svgWrap.classList.remove('panning');
  isDraggingNode = false;
  dragNodeId = null;
  isResizing = false;
  resizeNodeId = null;
});

svgWrap.addEventListener('click', e => {
  if (e.target === svgWrap || e.target.id === 'main-svg' || e.target.id === 'world') {
    selectedNodeId = null;
    closeSidebar();
    render();
  }
  hideCtxMenu();
});

// ─── Context Menu ─────────────────────────────────────────────────────────────
const ctxMenu = document.getElementById('ctx-menu');
let ctxNode = null;

function showCtxMenu(x, y, node) {
  ctxNode = node;
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top = y + 'px';
  ctxMenu.classList.add('show');
}
function hideCtxMenu() {
  ctxMenu.classList.remove('show');
  ctxNode = null;
}

document.addEventListener('click', e => {
  if (!ctxMenu.contains(e.target)) hideCtxMenu();
});
document.addEventListener('contextmenu', e => {
  if (!ctxMenu.contains(e.target) && !e.target.closest('[data-id]')) hideCtxMenu();
});

ctxMenu.addEventListener('click', e => {
  const item = e.target.closest('[data-action]');
  if (!item || !ctxNode) return;
  const action = item.dataset.action;
  const node = ctxNode;
  hideCtxMenu();

  if (action === 'add-child') {
    const ch = makeNode('子节点');
    node.children.push(ch);
    node.collapsed = false;
    doLayout(); render();
  } else if (action === 'add-sibling') {
    const parent = findParent(tree, node.id);
    if (!parent) { toast('根节点无法添加同级'); return; }
    const idx = parent.children.findIndex(c => c.id === node.id);
    const sib = makeNode('同级节点');
    parent.children.splice(idx + 1, 0, sib);
    doLayout(); render();
  } else if (action === 'edit') {
    selectedNodeId = node.id;
    openSidebar(node); render();
  } else if (action === 'toggle-collapse') {
    node.collapsed = !node.collapsed;
    doLayout(); render();
  } else if (action === 'cut') {
    if (node.id === tree.id) { toast('不能剪切根节点'); return; }
    clipboard = deepCloneRegen(node);
    const parent = findParent(tree, node.id);
    if (parent) { parent.children = parent.children.filter(c => c.id !== node.id); }
    if (selectedNodeId === node.id) selectedNodeId = null;
    doLayout(); render();
    toast('已剪切');
  } else if (action === 'paste') {
    if (!clipboard) { toast('剪贴板为空'); return; }
    node.children.push(deepCloneRegen(clipboard));
    node.collapsed = false;
    doLayout(); render();
  } else if (action === 'delete') {
    if (node.id === tree.id) { toast('不能删除根节点'); return; }
    const parent = findParent(tree, node.id);
    if (parent) { parent.children = parent.children.filter(c => c.id !== node.id); }
    if (selectedNodeId === node.id) { selectedNodeId = null; closeSidebar(); }
    doLayout(); render();
  }
});

// ─── Keyboard ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (!selectedNodeId || !tree) return;
  const node = findNode(tree, selectedNodeId);
  if (!node) return;

  if (e.key === 'Tab') {
    e.preventDefault();
    const ch = makeNode('子节点');
    node.children.push(ch); node.collapsed = false;
    doLayout(); render();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const parent = findParent(tree, node.id);
    if (!parent) { toast('根节点无法添加同级'); return; }
    const sib = makeNode('同级节点');
    const idx = parent.children.findIndex(c => c.id === node.id);
    parent.children.splice(idx + 1, 0, sib);
    doLayout(); render();
  } else if (e.key === 'Delete' || e.key === 'Backspace') {
    e.preventDefault();
    if (node.id === tree.id) { toast('不能删除根节点'); return; }
    const parent = findParent(tree, node.id);
    if (parent) parent.children = parent.children.filter(c => c.id !== node.id);
    selectedNodeId = null; closeSidebar();
    doLayout(); render();
  } else if (e.key === 'F2') {
    e.preventDefault();
    openSidebar(node);
  } else if (e.key === ' ') {
    e.preventDefault();
    // Center on selected
    const wrap = document.getElementById('svg-wrap');
    const wr = wrap.getBoundingClientRect();
    panX = wr.width / 2 - (node.x + node._w / 2) * scale;
    panY = wr.height / 2 - (node.y + node._h / 2) * scale;
    applyTransform();
  } else if ((e.ctrlKey || e.metaKey) && e.key === 'x') {
    e.preventDefault();
    if (node.id === tree.id) { toast('不能剪切根节点'); return; }
    clipboard = deepCloneRegen(node);
    const parent = findParent(tree, node.id);
    if (parent) parent.children = parent.children.filter(c => c.id !== node.id);
    selectedNodeId = null; closeSidebar();
    doLayout(); render(); toast('已剪切');
  } else if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
    e.preventDefault();
    if (!clipboard) { toast('剪贴板为空'); return; }
    node.children.push(deepCloneRegen(clipboard));
    node.collapsed = false;
    doLayout(); render();
  } else if (e.key === 'Escape') {
    closeSidebar();
    hideCtxMenu();
  }
});

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function openSidebar(node) {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sb-label').value = node.label;
  document.getElementById('sb-note').value = node.note || '';
  document.getElementById('sb-fontsize').value = node.fontSize || 14;

  // BG swatches
  const bgSw = document.getElementById('sb-bg-swatches');
  bgSw.innerHTML = '';
  NODE_COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'swatch' + (node.bg === c ? ' sel' : '');
    d.style.background = c;
    d.onclick = () => {
      node.bg = c;
      document.querySelectorAll('#sb-bg-swatches .swatch').forEach(s => s.classList.remove('sel'));
      d.classList.add('sel');
      render();
    };
    bgSw.appendChild(d);
  });

  // Text swatches
  const txSw = document.getElementById('sb-color-swatches');
  txSw.innerHTML = '';
  TEXT_COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'swatch' + (node.color === c ? ' sel' : '');
    d.style.background = c;
    if (c === '#fff' || c === '#ffffff' || c === '#f0f2f8') d.style.border = '2px solid #dde1f0';
    d.onclick = () => {
      node.color = c;
      document.querySelectorAll('#sb-color-swatches .swatch').forEach(s => s.classList.remove('sel'));
      d.classList.add('sel');
      render();
    };
    txSw.appendChild(d);
  });

  document.getElementById('sb-apply').onclick = () => {
    node.label = document.getElementById('sb-label').value || '节点';
    node.note = document.getElementById('sb-note').value;
    node.fontSize = parseInt(document.getElementById('sb-fontsize').value) || 14;
    doLayout(); render();
  };
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}
document.getElementById('close-sidebar').onclick = closeSidebar;

// ─── Supabase: Data ───────────────────────────────────────────────────────────
function setSyncStatus(s) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-dot';
  if (s === 'ok') { el.classList.add('ok'); el.textContent = '● 已同步'; }
  else if (s === 'ing') { el.classList.add('ing'); el.textContent = '● 同步中…'; }
  else { el.classList.add('err'); el.textContent = '● 同步失败'; }
}

async function loadData() {
  const { data, error } = await sb.from('mindmaps').select('*').eq('id', currentMapId).single();
  if (error || !data) return;
  tree = typeof data.tree === 'string' ? JSON.parse(data.tree) : data.tree;
  document.getElementById('map-title').value = data.title || '未命名';
  localUpdatedAt = data.updated_at;
}

async function saveData() {
  if (!currentMapId || !tree) return;
  setSyncStatus('ing');
  const title = document.getElementById('map-title').value;
  const now = new Date().toISOString();
  const { error } = await sb.from('mindmaps').update({
    tree: tree,
    title,
    updated_at: now
  }).eq('id', currentMapId);
  if (error) { setSyncStatus('err'); toast('保存失败: ' + error.message); }
  else { setSyncStatus('ok'); localUpdatedAt = now; }
}

function startPoll() {
  stopPoll();
  pollTimer = setInterval(async () => {
    if (!currentMapId) return;
    const { data } = await sb.from('mindmaps').select('updated_at').eq('id', currentMapId).single();
    if (data && data.updated_at && data.updated_at !== localUpdatedAt) {
      await loadData();
      doLayout(); render();
      toast('已同步他人更新 🔄');
    }
  }, 10000);
}
function stopPoll() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ─── Auth ────────────────────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (session && (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED')) {
    currentUser = session.user;
    await loadProfile();
    showView('v-list');
    loadMapList();
  } else if (!session) {
    currentUser = null;
    currentProfile = null;
    stopPoll();
    showView('v-auth');
  }
});

document.getElementById('do-login').onclick = async () => {
  const email = document.getElementById('l-email').value.trim();
  const pwd = document.getElementById('l-pwd').value;
  const errEl = document.getElementById('l-err');
  errEl.textContent = '';
  if (!email || !pwd) { errEl.textContent = '请填写邮箱和密码'; return; }
  showSpinner();
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
  hideSpinner();
  if (error) { errEl.textContent = error.message; return; }
  currentUser = data.user;
  await loadProfile();
  showView('v-list');
  loadMapList();
};

document.getElementById('do-register').onclick = async () => {
  const email = document.getElementById('r-email').value.trim();
  const uname = document.getElementById('r-uname').value.trim();
  const pwd = document.getElementById('r-pwd').value;
  const pwd2 = document.getElementById('r-pwd2').value;
  const errEl = document.getElementById('r-err');
  errEl.textContent = '';

  if (!email || !uname || !pwd || !pwd2) { errEl.textContent = '请填写所有字段'; return; }
  if (!/^[a-zA-Z0-9_]{3,20}$/.test(uname)) { errEl.textContent = '用户名需3-20位字母数字下划线'; return; }
  if (pwd !== pwd2) { errEl.textContent = '两次密码不一致'; return; }
  if (pwd.length < 6) { errEl.textContent = '密码至少6位'; return; }

  showSpinner();
  const { data, error } = await sb.auth.signUp({ email, password: pwd });
  if (error) { hideSpinner(); errEl.textContent = error.message; return; }

  // Insert profile
  const { error: pe } = await sb.from('profiles').insert({ id: data.user.id, username: uname });
  hideSpinner();
  if (pe) {
    // duplicate username?
    if (pe.code === '23505') errEl.textContent = '该用户名已被使用';
    else errEl.textContent = pe.message;
    await sb.auth.signOut();
    return;
  }
  currentUser = data.user;
  await loadProfile();
  showView('v-list');
  loadMapList();
};

async function loadProfile() {

  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();

  if (data) document.getElementById('hdr-username').textContent = data.username;

document.getElementById('do-new-map').onclick = async () => {
  const title = prompt('请输入导图标题：', '未命名导图');
  if (!title) return;
  showSpinner();

  // 确保 profiles 里有当前用户记录
  const { data: existingProfile } = await sb.from('profiles').select('id').eq('id', currentUser.id).single();

    });

  }

  }).select().single();

async function loadMapList() {
  if (!currentUser) { showView('v-auth'); return; }
  const grid = document.getElementById('cards');
  grid.innerHTML = '<div style="color:#6b7499;font-size:14px">加载中…</div>';
  
  // Own maps
  const { data: ownMaps, error: e1 } = await sb.from('mindmaps')
    .select('*').eq('owner_id', currentUser.id).order('created_at', { ascending: false });
  if (e1) { grid.innerHTML = `<div style="color:#ef5350">加载失败: ${e1.message}</div>`; return; }

  // Shared maps via collaborators
  const { data: collabs, error: e2 } = await sb.from('collaborators')
    .select('mindmap_id').eq('user_id', currentUser.id);
  if (e2) { grid.innerHTML = `<div style="color:#ef5350">加载失败: ${e2.message}</div>`; return; }

  let sharedMaps = [];
  if (collabs && collabs.length > 0) {
    const ids = collabs.map(c => c.mindmap_id);
    const { data: sm } = await sb.from('mindmaps').select('*').in('id', ids).order('created_at', { ascending: false });
    sharedMaps = sm || [];
  }

  grid.innerHTML = '';
  const all = [
    ...(ownMaps || []).map(m => ({ ...m, isOwn: true })),
    ...sharedMaps.map(m => ({ ...m, isOwn: false }))
  ];

  if (!all.length) {
    grid.innerHTML = '<div style="color:#6b7499;font-size:14px">暂无导图，点击「+ 新建导图」创建第一个</div>';
    return;
  }

  for (const map of all) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-title">${escHtml(map.title)}</div>
        <span class="badge ${map.isOwn ? 'badge-own' : 'badge-shared'}">${map.isOwn ? '我创建的' : '共享给我'}</span>
      </div>
      <div class="card-time">${fmtDate(map.created_at)}</div>
      <div class="card-actions">
        <button class="btn btn-primary btn-sm" data-enter="${map.id}">进入编辑</button>
        ${map.isOwn ? `<button class="btn btn-danger btn-sm" data-del="${map.id}">删除</button>` : ''}
      </div>
    `;
    card.querySelector('[data-enter]').onclick = () => enterEditor(map.id, map.owner_id);
    const delBtn = card.querySelector('[data-del]');
    if (delBtn) delBtn.onclick = async () => {
      if (!confirm(`确定删除「${map.title}」？此操作不可恢复。`)) return;
      showSpinner();
      await sb.from('mindmaps').delete().eq('id', map.id);
      hideSpinner();
      toast('已删除');
      loadMapList();
    };
    grid.appendChild(card);
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function showShareModal() {
  const isOwner = currentUser && currentMapOwnerId === currentUser.id;
  const modal = createModal('👥 共享设置');
  const body = modal.querySelector('.modal-body');

  if (isOwner) {
    body.innerHTML = `
      <div class="field">
        <label>搜索用户名邀请协作者</label>
        <input type="text" id="sh-search" placeholder="输入用户名">
      </div>
      <div id="sh-results"></div>
      <div style="margin-top:16px;font-weight:600;font-size:14px;margin-bottom:8px">当前协作者</div>
      <div id="sh-collabs"></div>
    `;
    loadCollabList();

    let searchTimer;
    document.getElementById('sh-search').oninput = (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => searchUsers(e.target.value), 300);
    };
  } else {
    body.innerHTML = '<div style="color:#6b7499;font-size:14px">只有导图创建者可管理共享</div>';
  }
}

async function searchUsers(q) {
  const res = document.getElementById('sh-results');
  if (!res) return;
  if (!q || q.length < 1) { res.innerHTML = ''; return; }
  const { data } = await sb.from('profiles').select('*')
    .ilike('username', `%${q}%`)
    .neq('id', currentUser.id)
    .limit(8);
  res.innerHTML = '';
  if (!data || !data.length) { res.innerHTML = '<div style="color:#6b7499;font-size:13px;margin-top:8px">未找到用户</div>'; return; }
  for (const p of data) {
    const d = document.createElement('div');
    d.className = 'collab-result';
    d.innerHTML = `<span>👤</span><span>${escHtml(p.username)}</span><span style="margin-left:auto;color:#6b7499;font-size:12px">${escHtml(p.id.slice(0,8))}…</span>`;
    d.onclick = async () => {
      const { error } = await sb.from('collaborators').insert({ mindmap_id: currentMapId, user_id: p.id, can_edit: true });
      if (error && error.code === '23505') toast('该用户已是协作者');
      else if (error) toast('添加失败');
      else { toast(`已添加 ${p.username}`); loadCollabList(); }
      res.innerHTML = '';
      const si = document.getElementById('sh-search');
      if (si) si.value = '';
    };
    res.appendChild(d);
  }
}

async function loadCollabList() {
  const el = document.getElementById('sh-collabs');
  if (!el) return;
  const { data } = await sb.from('collaborators')
    .select('*, profiles(username)').eq('mindmap_id', currentMapId);
  el.innerHTML = '';
  if (!data || !data.length) { el.innerHTML = '<div style="color:#6b7499;font-size:13px">暂无协作者</div>'; return; }
  for (const c of data) {
    const d = document.createElement('div');
    d.className = 'collab-list-item';
    d.innerHTML = `<span>👤 ${escHtml(c.profiles?.username || '未知')}</span><button class="rm-btn" data-cid="${c.id}" title="移除">✕</button>`;
    d.querySelector('.rm-btn').onclick = async () => {
      await sb.from('collaborators').delete().eq('id', c.id);
      toast('已移除');
      loadCollabList();
    };
    el.appendChild(d);
  }
}

// ─── Import Modal ─────────────────────────────────────────────────────────────
document.getElementById('do-import').onclick = () => showImportModal();

function showImportModal() {
  const modal = createModal('📥 导入');
  const body = modal.querySelector('.modal-body');
  body.innerHTML = `
    <div class="itabs">
      <div class="itab on" data-ip="xmind">XMind</div>
      <div class="itab" data-ip="image">PNG/JPG 背景</div>
      <div class="itab" data-ip="json">JSON</div>
    </div>
    <div class="ipanel on" id="ip-xmind">
      <div class="field"><label>选择 .xmind 文件</label><input type="file" id="xmind-file" accept=".xmind"></div>
    </div>
    <div class="ipanel" id="ip-image">
      <div class="field"><label>选择图片文件</label><input type="file" id="img-file" accept=".png,.jpg,.jpeg,.gif,.webp"></div>
      <div class="field">
        <label>透明度: <span id="opacity-val">0.5</span></label>
        <input type="range" id="img-opacity" min="0" max="1" step="0.05" value="0.5" style="width:100%">
      </div>
    </div>
    <div class="ipanel" id="ip-json">
      <div class="field"><label>选择 .json 文件</label><input type="file" id="json-file" accept=".json"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary close-modal">取消</button>
      <button class="btn btn-primary" id="do-import-ok">导入</button>
    </div>
  `;

  // Tab switch
  body.querySelectorAll('.itab').forEach(t => {
    t.onclick = () => {
      body.querySelectorAll('.itab').forEach(x => x.classList.remove('on'));
      body.querySelectorAll('.ipanel').forEach(x => x.classList.remove('on'));
      t.classList.add('on');
      document.getElementById('ip-' + t.dataset.ip).classList.add('on');
    };
  });

  const opInput = document.getElementById('img-opacity');
  const opVal = document.getElementById('opacity-val');
  opInput.oninput = () => { opVal.textContent = opInput.value; };

  document.getElementById('do-import-ok').onclick = async () => {
    const activeTab = body.querySelector('.itab.on').dataset.ip;

    if (activeTab === 'xmind') {
      const file = document.getElementById('xmind-file').files[0];
      if (!file) { toast('请选择文件'); return; }
      try {
        const zip = await JSZip.loadAsync(file);
        let content;
        // Try content.json first
        const cj = zip.file('content.json');
        if (cj) {
          content = JSON.parse(await cj.async('string'));
        } else {
          // Try content.xml
          toast('未找到 content.json，请使用较新版 XMind 导出'); return;
        }
        const root = content[0];
        tree = xmindToTree(root.rootTopic || root);
        document.getElementById('map-title').value = root.title || '导入的导图';
        closeAllModals();
        doLayout(); render(); fitView(); saveData();
        toast('XMind 导入成功');
      } catch (err) {
        toast('解析失败: ' + err.message);
      }
    } else if (activeTab === 'image') {
      const file = document.getElementById('img-file').files[0];
      if (!file) { toast('请选择图片'); return; }
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          bgLayer = { url: e.target.result, x: -img.width/2, y: -img.height/2, w: img.width, h: img.height, opacity: parseFloat(document.getElementById('img-opacity').value) };
          closeAllModals();
          render();
          toast('背景图片已添加');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    } else if (activeTab === 'json') {
      const file = document.getElementById('json-file').files[0];
      if (!file) { toast('请选择文件'); return; }
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.tree) { toast('JSON 格式错误，缺少 tree 字段'); return; }
          tree = data.tree;
          if (data.title) document.getElementById('map-title').value = data.title;
          closeAllModals();
          doLayout(); render(); fitView(); saveData();
          toast('JSON 导入成功');
        } catch (err) {
          toast('解析失败: ' + err.message);
        }
      };
      reader.readAsText(file);
    }
  };
}

function xmindToTree(xNode) {
  const n = makeNode(xNode.title || '节点');
  const children = xNode.children?.attached || xNode.children || [];
  n.children = children.map(c => xmindToTree(c));
  return n;
}

// ─── Export ───────────────────────────────────────────────────────────────────
document.getElementById('do-export-svg').onclick = () => {
  if (!tree) return;
  const svg = document.getElementById('main-svg');
  const clone = svg.cloneNode(true);
  // Reset transform
  const world = clone.getElementById ? clone.getElementById('world') : clone.querySelector('#world');
  if (world) world.removeAttribute('transform');
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(clone);
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  downloadBlob(blob, 'mindmap.svg');
};

document.getElementById('do-export-json').onclick = () => {
  if (!tree) return;
  const data = { title: document.getElementById('map-title').value, tree };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  downloadBlob(blob, 'mindmap.json');
};

function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 500);
}

// ─── Modal helpers ────────────────────────────────────────────────────────────
function createModal(title) {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal"><h3>${escHtml(title)}</h3><div class="modal-body"></div></div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click', e => { if (e.target === bg) bg.remove(); });
  bg.querySelectorAll('.close-modal').forEach(b => b.onclick = () => bg.remove());
  // Add default close button in footer if not present
  const footer = bg.querySelector('.modal-footer');
  if (!footer) {
    const f = document.createElement('div');
    f.className = 'modal-footer';
    f.innerHTML = '<button class="btn btn-secondary close-modal">关闭</button>';
    f.querySelector('.close-modal').onclick = () => bg.remove();
    bg.querySelector('.modal').appendChild(f);
  }
  return bg.querySelector('.modal');
}

function closeAllModals() {
  document.querySelectorAll('.modal-bg').forEach(m => m.remove());
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  showSpinner();
  const { data: { session } } = await sb.auth.getSession();
  hideSpinner();
  if (session) {
    currentUser = session.user;
    await loadProfile();
    showView('v-list');
    loadMapList();
  } else {
    showView('v-auth');
  }
})();
</script>
